name: Laravel Code Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - master
      - recette

jobs:
  laravel-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          extensions: mbstring, xml, ctype, json, bcmath, pdo_sqlite, tokenizer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # 1. CODE STYLE (Laravel Pint) – pas de SARIF, simple check
      - name: Run Laravel Pint
        id: pint
        run: |
          vendor/bin/pint --test --ansi
        continue-on-error: true

      - name: Annotate Pint errors
        if: steps.pint.outcome == 'failure'
        run: |
          echo "::error::Code style violations found. Run 'vendor/bin/pint' to fix them."

      # 2. STATIC ANALYSIS avec PHPStan (supporte SARIF!)
      - name: Run PHPStan (Larastan)
        run: |
          vendor/bin/phpstan analyse --error-format=sarif --memory-limit=1G > phpstan-results.sarif || true

      - name: Upload PHPStan SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: phpstan-results.sarif
          category: phpstan

      # 3. SECURITY CHECK avec composer audit
      - name: Run Composer Security Audit
        run: |
          if [ -f "composer.lock" ]; then
            composer audit --locked --format=json | tee composer-audit-results.json
          else
            echo "No composer.lock found, skipping audit."
          fi
        continue-on-error: true

      - name: Upload Composer Audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: composer-audit-results
          path: composer-audit-results.json
          retention-days: 7

      # 4. OPTIONNEL – PHP Insights (métriques)
      - name: Run PHP Insights
        continue-on-error: true
        run: |
          composer global require nunomaduro/phpinsights
          php ~/.composer/vendor/bin/phpinsights --no-interaction --format=github-action || true

      # 5. POST PR COMMENT (résumé)
      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = [
              '## 📊 Laravel Quality Check',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| **Code Style (Pint)** | ${{ steps.pint.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |',
              '| **Static Analysis (PHPStan)** | ' + (fs.existsSync('phpstan-results.sarif') ? '✅ Report uploaded' : '⚠️ No report') + ' |',
              '| **Security Audit** | ' + (fs.existsSync('composer-audit-results.json') ? '✅ Done' : '⚠️ Skipped (no lock file)') + ' |'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Laravel Quality Check'));
            if (botComment) {
              await github.rest.issues.updateComment({ comment_id: botComment.id, body: summary, ...context.repo });
            } else {
              await github.rest.issues.createComment({ issue_number: context.issue.number, body: summary, ...context.repo });
            }
