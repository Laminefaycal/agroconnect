name: Laravel Code Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - master
      - recette

jobs:
  laravel-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 1   # Évite les références distantes superflues

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          extensions: mbstring, xml, ctype, json, bcmath, pdo_sqlite, tokenizer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # 1. Code style
      - name: Run Laravel Pint
        id: pint
        run: vendor/bin/pint --test --ansi
        continue-on-error: true

      - name: Annotate Pint errors
        if: steps.pint.outcome == 'failure'
        run: echo "::error::Code style violations found. Run 'vendor/bin/pint' to fix them."

      # 2. Static analysis with PHPStan
      - name: Run PHPStan
        id: phpstan
        run: |
          mkdir -p reports
          vendor/bin/phpstan analyse --error-format=sarif --memory-limit=1G > reports/phpstan-results.sarif
          # Si le fichier est vide, on le supprime pour éviter l'erreur d'upload
          if [ ! -s reports/phpstan-results.sarif ]; then
            rm reports/phpstan-results.sarif
            echo "no_sarif=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload PHPStan SARIF
        if: steps.phpstan.outputs.no_sarif != 'true' && (success() || failure())
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/phpstan-results.sarif
          category: phpstan

      # 3. Security audit
      - name: Run Composer Security Audit
        id: audit
        run: |
          if [ -f "composer.lock" ]; then
            composer audit --locked --format=json | tee composer-audit-results.json
          else
            echo "no_lockfile=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload Composer Audit results
        uses: actions/upload-artifact@v4
        if: always() && steps.audit.outputs.no_lockfile != 'true'
        with:
          name: composer-audit-results
          path: composer-audit-results.json
          retention-days: 7

      # 4. Optional PHP Insights
      - name: Run PHP Insights
        continue-on-error: true
        run: |
          composer global require nunomaduro/phpinsights
          php ~/.composer/vendor/bin/phpinsights --no-interaction --format=github-action || true

      # 5. PR comment summary
      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let pintStatus = '${{ steps.pint.outcome }}' === 'success' ? '✅ Pass' : '❌ Fail';
            let stanStatus = fs.existsSync('reports/phpstan-results.sarif') ? '✅ SARIF uploaded' : '⚠️ No issues found (or empty)';
            let auditStatus = fs.existsSync('composer-audit-results.json') ? '✅ Done' : '⚠️ Skipped (no lock file)';
            const summary = `## 📊 Laravel Quality Check\n\n| Check | Status |\n|-------|--------|\n| **Code Style (Pint)** | ${pintStatus} |\n| **Static Analysis (PHPStan)** | ${stanStatus} |\n| **Security Audit** | ${auditStatus} |`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Laravel Quality Check'));
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                body: summary,
                owner: context.repo.owner,
                repo: context.repo.repo
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                body: summary,
                owner: context.repo.owner,
                repo: context.repo.repo
              });
            }
